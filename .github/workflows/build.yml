name: Build and Commit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'bin/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild PortionOfScreen.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Copy exe to bin folder
        run: |
          mkdir bin -Force
          Copy-Item x64/Release/PortionOfScreen.exe bin/PortionOfScreen.exe -Force
        shell: pwsh

      - name: Commit built exe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/PortionOfScreen.exe
          git diff --cached --quiet || git commit -m "Update built exe [skip ci]"
          git push
        shell: bash
